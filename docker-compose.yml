services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - semantic_cache_internal_net

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    networks:
      - semantic_cache_internal_net

  semantic_cache_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic_cache_api_service
    restart: unless-stopped
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL}
      - REDIS_BASE_URL=${REDIS_BASE_URL}
      - REDIS_VECTOR_INDEX_NAME=${REDIS_VECTOR_INDEX_NAME}
      - REDIS_VECTOR_KEY_PREFIX=${REDIS_VECTOR_KEY_PREFIX}
      - REDIS_VECTOR_DIM=${REDIS_VECTOR_DIM}
      - HF_DATASET_NAME=${HF_DATASET_NAME}
      - HF_DATASET_QUESTION_FIELD=${HF_DATASET_QUESTION_FIELD}
      - HF_DATASET_ANSWER_FIELD=${HF_DATASET_ANSWER_FIELD}

    depends_on:
      - ollama
      - redis
    networks:
      - semantic_cache_internal_net

networks:
  semantic_cache_internal_net:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  redis_data:
    driver: local